<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catherina International Academy | a place to be../title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .navy-blue { background-color: #001f3f; }
        .gold-text { color: #D4AF37; }
        .hero-gradient { background: linear-gradient(rgba(0,31,63,0.8), rgba(0,31,63,0.8)), url('your-compound-image.jpg'); background-size: cover; background-position: center; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="navy-blue text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
                    <span class="text-blue-900 font-bold">CIA</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight">CATHERINA ACADEMY</h1>
            </div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#home" class="hover:text-yellow-500 transition">Home</a>
                <a href="#about" class="hover:text-yellow-500 transition">About</a>
                <a href="#academics" class="hover:text-yellow-500 transition">Academics</a>
                <a href="#contact" class="hover:text-yellow-500 transition">Contact</a>
                <a href="tel:08062625455" class="bg-yellow-600 px-4 py-2 rounded text-white hover:bg-yellow-700 transition">Enroll Now</a>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-gradient h-[80vh] flex items-center text-center text-white px-4">
        <div class="container mx-auto">
            <h2 class="text-4xl md:text-6xl font-bold mb-4">Empowering Minds, Shaping Futures</h2>
            <p class="text-lg md:text-2xl mb-8 italic text-gray-200">"a place to be</p>
            <div class="flex flex-col md:flex-row justify-center gap-4">
                <a href="#contact" class="bg-white text-blue-900 px-8 py-3 rounded-full font-bold text-lg hover:bg-gray-200 transition">Visit Us Today</a>
                <a href="#academics" class="border-2 border-white px-8 py-3 rounded-full font-bold text-lg hover:bg-white hover:text-blue-900 transition">Explore Programs</a>
            </div>
        </div>
    </section>

    <section id="about" class="py-20 bg-white">
        <div class="container mx-auto px-4 grid md:grid-cols-2 gap-12 items-center">
            <div>
                <h3 class="text-3xl font-bold text-blue-900 mb-6 border-l-4 border-yellow-500 pl-4">Why Choose Catherina Academy?</h3>
                <p class="text-gray-600 leading-relaxed mb-4">
                    Located in the heart of Abuja, Catherina International Academy is dedicated to nurturing young minds. We believe that every child has the potential to lead, and our mission is to provide the tools necessary for that journey.
                </p>
                <p class="text-gray-600 leading-relaxed mb-6">
                    Our environment is safe, engaging, and equipped with modern facilities to ensure that learning is not just a task, but a lifelong passion.
                </p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 bg-blue-50 rounded-lg text-center">
                        <i class="fas fa-microscope text-blue-900 text-2xl mb-2"></i>
                        <p class="font-bold">Modern Labs</p>
                    </div>
                    <div class="p-4 bg-blue-50 rounded-lg text-center">
                        <i class="fas fa-shield-alt text-blue-900 text-2xl mb-2"></i>
                        <p class="font-bold">Safe Environment</p>
                    </div>
                </div>
            </div>
            <div class="bg-gray-200 h-80 rounded-2xl shadow-xl overflow-hidden">
                <div class="flex items-center justify-center h-full text-gray-400">
                   <p>Your Classroom Image Here</p>
                </div>
            </div>
        </div>
    </section>

    <section id="academics" class="py-20 bg-gray-50">
        <div class="container mx-auto px-4 text-center">
            <h3 class="text-3xl font-bold text-blue-900 mb-12">Academic Excellence</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-white p-8 rounded-xl shadow-md border-t-4 border-blue-900">
                    <i class="fas fa-child text-4xl text-blue-900 mb-4"></i>
                    <h4 class="text-xl font-bold mb-2">Early Years</h4>
                    <p class="text-gray-500">Creche, Foundation & Nursery levels designed for sensory development and discovery.</p>
                </div>
                <div class="bg-white p-8 rounded-xl shadow-md border-t-4 border-blue-900">
                    <i class="fas fa-book text-4xl text-blue-900 mb-4"></i>
                    <h4 class="text-xl font-bold mb-2">Basic 1 - 5</h4>
                    <p class="text-gray-500">A strong foundation in core subjects including literacy, numeracy, and basic science.</p>
                </div>
                <div class="bg-white p-8 rounded-xl shadow-md border-t-4 border-blue-900">
                    <i class="fas fa-user-graduate text-4xl text-blue-900 mb-4"></i>
                    <h4 class="text-xl font-bold mb-2">Secondary</h4>
                    <p class="text-gray-500">JS 1–3 and SS 1–3. Preparing students for WAEC, NECO, and international exams.</p>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-20 navy-blue text-white">
        <div class="container mx-auto px-4 grid md:grid-cols-2 gap-12">
            <div>
                <h3 class="text-3xl font-bold mb-6">Contact Us</h3>
                <ul class="space-y-6">
                    <li class="flex items-start space-x-4">
                        <i class="fas fa-map-marker-alt text-yellow-500 mt-1"></i>
                        <span>No. 13 Catherine Street, Dutse Layout, Dawaki Road, Abuja.</span>
                    </li>
                    <li class="flex items-center space-x-4">
                        <i class="fas fa-phone text-yellow-500"></i>
                        <span>0806 262 5455</span>
                    </li>
                    <li class="flex items-center space-x-4">
                        <i class="fas fa-envelope text-yellow-500"></i>
                        <span>catherinaacademy@gmail.com</span>
                    </li>
                </ul>
                <div class="mt-8 flex space-x-4">
                    <a href="#" class="w-10 h-10 bg-blue-800 flex items-center justify-center rounded-full hover:bg-yellow-500 transition"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="w-10 h-10 bg-blue-800 flex items-center justify-center rounded-full hover:bg-yellow-500 transition"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
            <div class="bg-white p-8 rounded-2xl text-blue-900">
                <h4 class="text-xl font-bold mb-4">Admission Inquiry</h4>
                <form class="space-y-4">
                    <input type="text" placeholder="Parent Full Name" class="w-full p-3 border rounded bg-gray-50">
                    <input type="email" placeholder="Email Address" class="w-full p-3 border rounded bg-gray-50">
                    <select class="w-full p-3 border rounded bg-gray-50">
                        <option>Select Class of Interest</option>
                        <option>Creche/Nursery</option>
                        <option>Basic 1-5</option>
                        <option>Secondary (JS/SS)</option>
                    </select>
                    <button class="w-full navy-blue text-white p-3 rounded font-bold hover:opacity-90 transition">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="bg-black text-gray-400 py-6 text-center text-sm">
        <p>&copy; 2026 Catherina International Academy. All Rights Reserved.</p>
    </footer>

</body>
</html>
